# TSV 转 HTML 表格的偏好配置
# 说明：
# - 这是扁平 YAML，只使用 key: value 形式。
# - 命令行显式传入的参数优先级更高；没传的参数会读取这里。
# - 和 CSS 有关的高度/宽度参数会同时写入 HTML 的 CSS 变量，方便视觉和分页估算保持一致。

# 输出页面宽度，单位 px。
# 默认 2000 表示每个 HTML 页的表格画布宽度约为 2000px。
page_width_px: 2000

# 输出页面高度，单位 px。
# 默认 1800 表示每个 HTML 页和导出的图片高度为 1800px。
page_height_px: 1800

# 每一列允许使用的最大纵向高度，单位 px。
# 建议比 page_height_px 略小，给页面内边距留空间。
# 超过后进入下一列；最后一列也不够就生成下一页。
page_max_height_px: 2000

# 每页分成几列。
# 参考图是 4 列风格，所以默认 4。
columns: 5

# 每个品牌续表的硬性最大行数。
# 0 表示不额外限制行数，只根据 page_max_height_px 自动拆分。
max_rows: 0

# 品牌表换列/换页时，每个分块至少保留几行数据内容。
# 例如 2 表示尽量避免某个品牌续表只剩 1 行。
min_rows_per_brand_chunk: 2

# 品牌蓝色标题条估算高度，单位 px。
# 需要和 CSS 里的 --brand-title-height 接近，否则分页估算会偏。
brand_title_height_px: 38

# 表头行估算高度，单位 px。
# 即 MODEL / YEAR / TYPE / SIZE 那一行。
table_header_height_px: 22

# 数据行估算高度，单位 px。
# 字体变大、上下 padding 变大时，需要适当调高。
table_row_height_px: 25

# 每个品牌表格下方的间距，单位 px。
# 需要和 CSS 里的 --chart-gap 接近。
table_gap_px: 14

# HTML title 和可选标题块文字。
# 默认标题块隐藏；show_title 为 true 时才显示。
title: FIND THE RIGHT SIZE
subtitle: FOR YOUR CAR COVER
show_title: false

# TSV 里用于分组的品牌列名。
brand_column: BRAND

# TSV 里用于控制行底纹交替分组的列名。
# 留空时自动优先使用“排序车型”；没有该列时使用 MODEL。
stripe_column:

# 表格中显示的列名，顺序会影响 HTML 表格列顺序。
table_columns: MODEL,YEAR,TYPE,SIZE

# 输出 HTML 引用的 CSS 文件。
# 留空时脚本默认使用输出目录里的 size-chart-template.css。
css_path:
