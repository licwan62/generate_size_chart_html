# 输入和标题。
title: FIND THE RIGHT SIZE
subtitle: FOR YOUR CAR COVER
show_title: false
brand_column:
store_column: 店铺
stripe_column: MODEL
table_columns:
make_column: MAKE
model_column: SHORT-MODEL MODEL
type_column: TYPE LONG-TYPE

# 分页规则。会影响切页的高度都放这里，不放 CSS。
page_bottom_safe_margin_px: 10
max_rows: 0
min_rows_per_brand_chunk: 2
line_height: 1
table_row_height_px: 30
make_padding_y: 5px
header_height_px: 40
brand_block_gap_px: 8

# 页面尺寸和布局。脚本会写入 size-chart.css。
page_width_px: 2000
page_height_px: 1800
chart_columns: 5
page_padding_px: 14
column_gap: 10px

# 颜色。
page_background: #ffffff
page_text: #111111
make_background: #1a77bb
make_text: #ffffff
table_background: #ffffff
row_stripe_light: #f5f5f5
row_stripe_dark: #e2e1df
header_background: #33363a
header_text: #f1f1f1

# 边框和块样式。
table_border_color: #ffffff
table_border_width: 2px
table_outline_color: rgba(0, 0, 0, 0.08)
table_outline_width: 0
table_radius: 6px
brand_block_padding: 0

# 单元格和对齐。
cell_padding_x: 5px
size_cell_padding_x: 2px
model_align: left
year_align: center
type_align: left
cab_align: center
bed_align: center
size_align: center

# 列宽。
model_col_width: 25%
year_col_width: 25%
type_col_width: 35%
cab_col_width: 20%
bed_col_width: 20%
size_col_width: 15%

# 字体。
base_font_family: D-DIN-PRO, sans-serif
make_font_family: Arial, Helvetica, sans-serif
make_font_size: 25px
make_font_weight: 700
brand_padding_x: 10px
