brand_logo_opacity: 0.8
brand_logo_width: 46px
brand_logo_height: 32px
brand_logo_right: 10px
description_font_family: Arial, Helvetica, sans-serif
description_font_size: 14px
description_font_weight: 400
description_text: #ffffff
description_margin_top: 2px
description_text_transform: none
brand_part_font_size: 20px
brand_part_align: center
header_font_family: D-DIN-PRO, Helvetica, sans-serif
header_font_size: 20px
header_font_weight: 600
header_padding_y: 1px
